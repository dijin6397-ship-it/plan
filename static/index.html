<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生产计划自动排程系统</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="logo.jpg" alt="Logo" class="logo">
                <div class="header-text">
                    <h1>生产计划自动排程系统</h1>
                    <p class="subtitle">阶段 - SBOP(工序) - 工单 三级结构管理</p>
                </div>
                <div class="header-actions">
                    <span id="userInfo" class="user-info"></span>
                    <a id="adminLink" class="btn btn-sm btn-secondary" href="admin.html" style="display:none;">账号及权限</a>
                    <button id="logoutBtn" class="btn btn-sm" style="display:none;">退出登录</button>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="control-panel">
                    <h3>排程设置</h3>
                    <div class="form-group">
                        <label for="trainNumberInput">1) 添加列车号:</label>
                        <input type="text" id="trainNumberInput" placeholder="请输入列车号, 如 2101">
                    </div>
                    <div class="form-group">
                        <label for="templateSelect">2) 选择数据模板:</label>
                        <select id="templateSelect">
                            <option value="">-- 请选择模板 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startTime">3) 开始作业时间:</label>
                        <input type="date" id="startTime">
                    </div>
                    <button id="scheduleBtn" class="btn btn-primary">添加/更新到排程</button>
                    <button id="clearScheduleBtn" class="btn btn-danger">清空所有列车排程</button>
                    <div class="train-plan-panel">
                        <h4>已添加列车</h4>
                        <div id="trainPlanList" class="train-plan-list"></div>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="gantt">生产计划排程</button>
                    <button class="tab-btn" data-tab="data">结构化数据管理</button>
                </div>

                <div id="ganttTab" class="tab-content active">
                    <div class="gantt-header">
                        <h3>生产计划排程甘特图</h3>
                        <div class="gantt-info" id="ganttInfo"></div>
                    </div>
                    <div class="gantt-toolbar">
                        <button class="btn btn-sm" onclick="expandAllGantt()">全部展开</button>
                        <button class="btn btn-sm" onclick="collapseAllGantt()">全部收缩</button>
                        <button class="btn btn-sm btn-success" onclick="exportGanttToExcel()">导出甘特图(Excel)</button>
                    </div>
                    <div class="gantt-container" id="ganttContainer">
                        <div id="ganttTree" class="gantt-tree"></div>
                        <canvas id="ganttChart" style="display: none;"></canvas>
                    </div>

                    <!-- 新增：甘特图下方的查询明细清单区域 -->
                    <div class="search-details-section">
                        <div class="section-header">
                            <h3>明细清单查询</h3>
                            <div class="search-toolbar-bottom">
                                <span class="view-label">列车号：</span>
                                <select id="trainNumberFilter">
                                    <option value="all">全部列车</option>
                                </select>
                                <span class="view-label">班组筛选：</span>
                                <select id="teamFilter">
                                    <option value="all">全部班组</option>
                                </select>
                                <span class="view-label">开始日期：</span>
                                <input type="date" id="filterStartDate">
                                <span class="view-label">结束日期：</span>
                                <input type="date" id="filterEndDate">
                                <button class="btn btn-primary btn-sm" onclick="searchDetails()">查询明细</button>
                                <button class="btn btn-success btn-sm" onclick="exportDetailsToExcel()">导出Excel</button>
                                <button class="btn btn-sm" onclick="resetFilters()">重置</button>
                            </div>
                        </div>
                        <div id="detailsListContainer" class="details-list-container">
                            <table id="detailsTable" class="details-table">
                                <thead>
                                    <tr>
                                        <th>列车号</th>
                                        <th>检修阶段</th>
                                        <th>SBOP名称</th>
                                        <th>班组</th>
                                        <th>工单名称</th>
                                        <th>开始日期</th>
                                        <th>结束日期</th>
                                        <th>工时(小时)</th>
                                        <th>人数</th>
                                    </tr>
                                </thead>
                                <tbody id="detailsTableBody">
                                    <tr>
                                        <td colspan="9" class="empty-text">请选择条件后点击“查询明细”</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="dataTab" class="tab-content">
                    <div class="data-panel-inline">
                        <h3>模板管理</h3>
                        <div class="form-group">
                            <label for="editTemplateSelect">选择现有模板:</label>
                            <select id="editTemplateSelect">
                                <option value="">-- 请选择模板 --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="templateName">当前模板名称:</label>
                            <input type="text" id="templateName" placeholder="如：02A05型列车排程模板">
                        </div>
                        <div class="button-group">
                            <button id="saveTemplateBtn" class="btn btn-primary">保存模板</button>
                            <button id="importTemplateBtn" class="btn btn-info" onclick="document.getElementById('templateFileInput').click()">导入模板</button>
                            <input type="file" id="templateFileInput" style="display: none;" accept=".xlsx" onchange="importTemplate(this)">
                            <button id="downloadTemplateBtn" class="btn btn-success">下载模板(Excel)</button>
                            <button id="deleteTemplateBtn" class="btn btn-danger">删除模板</button>
                        </div>
                    </div>
                    
                    <div class="data-panel-inline">
                        <h3>班组数据字典</h3>
                        <div class="team-management">
                            <div class="form-group">
                                <input type="text" id="newTeamName" placeholder="输入新班组名称">
                                <button class="btn btn-primary" onclick="addTeam()">添加班组</button>
                            </div>
                            <div id="teamList" class="team-list">
                                <!-- 班组列表将通过 JS 渲染 -->
                            </div>
                        </div>
                    </div>

                    <div class="data-panel-inline">
                        <h3>模板数据编辑 (阶段 - SBOP - 工单)</h3>
                        <div class="button-group">
                            <button id="addPhaseBtn" class="btn btn-success">添加检修阶段</button>
                            <button class="btn btn-sm" onclick="expandAllDataTree()">全部展开</button>
                            <button class="btn btn-sm" onclick="collapseAllDataTree()">全部收缩</button>
                        </div>
                    </div>
                    
                    <div class="data-tree" id="dataTree"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">添加项目</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
